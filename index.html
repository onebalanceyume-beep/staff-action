<title>ワンバランス 提案ボード</title>
<style>
:root{
  --crimson:#AD002D; --crimson-deep:#7E0020; --crimson-soft:#F6E4E8;
  --ink:#15110f; --ink2:#3d3835; --muted:#928c87; --line:#ecebe9;
  --paper:#ffffff; --surface:#faf9f8;
  --radius:18px; --shadow:0 1px 2px rgba(30,20,15,.05),0 10px 30px rgba(30,20,15,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;
  line-height:1.55;-webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
button,input,textarea{font-family:inherit;font-size:16px;color:inherit}
button{cursor:pointer;border:none;background:none;touch-action:manipulation}

/* ---- top bar (white) ---- */
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 14px) 20px 14px;
}
.topbar .row{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:780px;margin:0 auto}
.topbar h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:11px;line-height:1}
.topbar h1 .mark{width:30px;height:30px;border-radius:9px;background:var(--crimson);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800;letter-spacing:0}
.topbar .sub{font-size:11px;color:var(--muted);margin-top:6px;font-weight:700;letter-spacing:.02em}
.add-biz{background:var(--crimson);color:#fff;font-weight:800;font-size:13px;letter-spacing:.01em;padding:11px 16px;border-radius:999px;white-space:nowrap;transition:transform .1s,background .15s}
.add-biz:active{transform:scale(.95);background:var(--crimson-deep)}

/* ---- layout ---- */
.wrap{max-width:780px;margin:0 auto;padding:22px 16px 90px}

/* ---- business card ---- */
.biz{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.biz-head{display:flex;align-items:center;gap:14px;padding:18px 18px 16px}
.logo{width:58px;height:58px;border-radius:15px;flex:none;object-fit:cover;background:var(--surface);overflow:hidden;border:1px solid var(--line)}
.logo .ph{width:100%;height:100%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:21px;letter-spacing:.02em;background:var(--crimson)}
.biz-meta{flex:1;min-width:0}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.18em;color:var(--crimson);text-transform:uppercase;margin-bottom:5px}
.biz-name{font-size:23px;font-weight:800;line-height:1.18;letter-spacing:-.015em;word-break:break-word;color:var(--ink)}
.biz-count{font-size:12px;color:var(--muted);font-weight:700;margin-top:7px;letter-spacing:.02em}
.icobtn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--muted);flex:none;transition:background .15s,color .15s}
.icobtn:active{background:var(--surface);color:var(--ink)}
.icobtn svg{width:18px;height:18px}
.head-actions{display:flex;gap:2px;flex:none;align-self:flex-start}

/* ---- items ---- */
.items{padding:0 12px 14px}
.empty{padding:20px 12px;color:var(--muted);font-size:13px;text-align:center;letter-spacing:.01em}
.item{border-radius:13px;margin:8px 0;background:var(--surface);border:1px solid var(--line);overflow:hidden;transition:border-color .18s}
.item.open{border-color:var(--crimson);background:#fff}
.item-head{display:flex;align-items:center;gap:11px;padding:15px 14px;width:100%;text-align:left}
.item-head .dot{width:7px;height:7px;border-radius:2px;background:var(--crimson);flex:none}
.item-title{flex:1;font-weight:700;font-size:15.5px;letter-spacing:-.005em;min-width:0;word-break:break-word;color:var(--ink)}
.item-tags{display:flex;gap:5px;flex:none}
.tag{font-size:10px;font-weight:800;padding:4px 8px;border-radius:6px;letter-spacing:.06em}
.tag.url{background:var(--crimson-soft);color:var(--crimson)}
.tag.img{background:#efedec;color:#6e6862}
.chev{width:18px;height:18px;color:var(--muted);flex:none;transition:transform .22s}
.item.open .chev{transform:rotate(180deg);color:var(--crimson)}
.item-body{display:none;padding:2px 16px 18px 32px}
.item.open .item-body{display:block}
.memo{font-size:14.5px;color:var(--ink2);white-space:pre-wrap;word-break:break-word;margin:4px 0 14px;line-height:1.65}
.attach-row{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:13px;letter-spacing:.01em;padding:11px 16px;border-radius:11px;transition:transform .1s,background .15s}
.btn svg{width:15px;height:15px}
.btn.copy{background:var(--crimson);color:#fff}
.btn.copy:active{background:var(--crimson-deep)}
.btn.qr{background:#fff;color:var(--crimson);border:1.5px solid var(--crimson)}
.btn.qr:active{background:var(--crimson-soft)}
.btn:active{transform:scale(.97)}
.urltext{font-size:11.5px;color:var(--muted);word-break:break-all;margin-top:10px;letter-spacing:.01em}
.item-img{margin-top:12px;max-width:170px;border-radius:11px;border:1px solid var(--line);display:block}
.item-edit{margin-top:14px;display:flex;gap:18px}
.linkbtn{font-size:12.5px;font-weight:800;color:var(--muted);letter-spacing:.03em}
.linkbtn.del{color:var(--crimson)}
.add-item{width:100%;margin:8px 0 2px;padding:14px;border-radius:12px;border:1.5px dashed #d8d4d0;color:var(--crimson);font-weight:800;font-size:13px;letter-spacing:.02em;background:#fff;transition:background .15s}
.add-item:active{background:var(--surface)}

/* ---- modal ---- */
.overlay{position:fixed;inset:0;background:rgba(21,17,15,.42);display:none;align-items:flex-end;justify-content:center;z-index:50}
.overlay.show{display:flex}
.sheet{background:#fff;width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:24px 20px calc(22px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;animation:up .24s cubic-bezier(.22,1,.36,1)}
@media(min-width:560px){.overlay{align-items:center;padding:20px}.sheet{border-radius:22px;animation:pop .2s ease}}
@keyframes up{from{transform:translateY(50px);opacity:.5}to{transform:none;opacity:1}}
@keyframes pop{from{transform:scale(.96);opacity:.5}to{transform:none;opacity:1}}
.sheet h2{margin:0 0 20px;font-size:20px;font-weight:800;letter-spacing:-.02em}
.field{margin-bottom:17px}
.field label{display:block;font-size:11px;font-weight:800;margin-bottom:8px;color:var(--ink);letter-spacing:.08em;text-transform:uppercase}
.field .hint{font-weight:700;color:var(--muted);font-size:11px;letter-spacing:0;text-transform:none}
.field input[type=text],.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;background:var(--surface);color:var(--ink)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--crimson);background:#fff}
.field textarea{min-height:96px;resize:vertical;line-height:1.6}
.uploader{display:flex;align-items:center;gap:13px}
.uploader .prev{width:62px;height:62px;border-radius:15px;object-fit:cover;background:var(--surface);flex:none;border:1px solid var(--line)}
.uploader .prev.ph{display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;letter-spacing:.02em;background:var(--crimson);border:none}
.filebtn{font-size:12.5px;font-weight:800;color:var(--crimson);padding:10px 15px;border:1.5px solid var(--crimson);border-radius:11px;letter-spacing:.02em}
.filebtn.clear{color:var(--muted);border-color:var(--line)}
.sheet-actions{display:flex;gap:11px;margin-top:10px}
.sheet-actions .save{flex:1;background:var(--crimson);color:#fff;font-weight:800;padding:15px;border-radius:13px;font-size:15px;letter-spacing:.02em}
.sheet-actions .save:active{background:var(--crimson-deep)}
.sheet-actions .cancel{flex:none;background:var(--surface);color:var(--ink2);font-weight:800;padding:15px 22px;border-radius:13px;border:1px solid var(--line)}

/* confirm */
.confirm-box{text-align:center}
.confirm-box .ttl{font-size:18px;font-weight:800;margin-bottom:10px;letter-spacing:-.01em}
.confirm-box .msg{font-size:13.5px;color:var(--ink2);margin-bottom:22px;white-space:pre-wrap;line-height:1.7}
.confirm-actions{display:flex;gap:11px}
.confirm-actions button{flex:1;padding:15px;border-radius:13px;font-weight:800;font-size:15px}
.confirm-actions .yes{background:var(--crimson);color:#fff}
.confirm-actions .no{background:var(--surface);color:var(--ink2);border:1px solid var(--line)}

/* qr modal */
.qr-box{text-align:center}
.qr-box h2{margin-bottom:18px}
.qr-canvas{display:inline-block;padding:18px;background:#fff;border-radius:18px;border:1px solid var(--line)}
.qr-canvas img,.qr-canvas table{width:220px;height:220px}
.qr-url{font-size:11.5px;color:var(--muted);word-break:break-all;margin:16px 0 4px}
.qr-close{margin-top:18px;width:100%;background:var(--surface);color:var(--ink2);font-weight:800;padding:15px;border-radius:13px;border:1px solid var(--line)}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(30px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:700;font-size:13.5px;letter-spacing:.02em;padding:12px 22px;border-radius:999px;opacity:0;pointer-events:none;transition:.26s cubic-bezier(.22,1,.36,1);z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* footer */
.foot{max-width:780px;margin:0 auto;padding:0 18px 34px;display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;letter-spacing:.03em}
.foot button{color:var(--crimson);font-weight:800;font-size:11px;letter-spacing:.03em}

.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:90;padding:20px}
.img-viewer.show{display:flex}
.img-viewer img{max-width:100%;max-height:100%;border-radius:10px}

/* ---- tabs ---- */
.tabs{display:flex;gap:6px;max-width:780px;margin:12px auto 0}
.tab{flex:1;padding:10px;border-radius:11px;font-weight:800;font-size:13.5px;letter-spacing:.04em;color:var(--muted);background:var(--surface);border:1px solid var(--line);transition:.15s}
.tab.active{color:#fff;background:var(--crimson);border-color:var(--crimson)}
.tab:active{transform:scale(.98)}

/* ---- goal view ---- */
.goal{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;padding:18px 16px 14px}
.goal-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px}
.goal-meta{flex:1;min-width:0}
.goal-name{font-size:22px;font-weight:800;line-height:1.18;letter-spacing:-.015em;color:var(--ink);word-break:break-word}
.bar{height:10px;border-radius:99px;background:var(--surface);border:1px solid var(--line);overflow:hidden;margin:2px 0 6px}
.fill{height:100%;background:var(--crimson);border-radius:99px;transition:width .35s ease}
.prog-text{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.02em;margin-bottom:6px}
.plans{margin-top:8px}
.plan{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.plan:first-child{border-top:0;padding-top:4px}
.plan-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.plan-name{flex:1;font-size:14.5px;font-weight:800;color:var(--ink);letter-spacing:-.005em}
.pdot{width:7px;height:7px;border-radius:2px;background:var(--crimson);flex:none}
.steps{padding:2px 0}
.step{display:flex;align-items:center;gap:11px;padding:8px 2px}
.ck{width:22px;height:22px;border-radius:50%;border:2px solid #cfd4da;flex:none;display:grid;place-items:center;cursor:pointer;color:#fff}
.ck svg{width:13px;height:13px;opacity:0}
.step.done .ck{background:var(--crimson);border-color:var(--crimson)}
.step.done .ck svg{opacity:1}
.stext{flex:1;font-size:14.5px;color:var(--ink);cursor:pointer;word-break:break-word}
.step.done .stext{text-decoration:line-through;color:var(--muted)}
.step-del{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#cfd4da;flex:none}
.step-del svg{width:15px;height:15px}
.step-del:active{background:var(--surface);color:var(--crimson)}
.ins{width:100%;border:0;background:transparent;color:var(--crimson);font-size:11.5px;font-weight:800;letter-spacing:.02em;text-align:left;padding:4px 0 4px 33px;cursor:pointer;opacity:.75}
.ins:active{opacity:1}
</style>
</head>

<!-- business modal -->
<div class="overlay" id="bizOverlay">
  <div class="sheet">
    <h2 id="bizModalTitle">事業を追加</h2>
    <div class="field">
      <label>事業名</label>
      <input type="text" id="bizName" placeholder="例：ワンバランスボクシングジム">
    </div>
    <div class="field">
      <label>ロゴ <span class="hint">（四角い画像が◎ / 未設定でもOK）</span></label>
      <div class="uploader">
        <div id="bizLogoPrev" class="prev ph"></div>
        <input type="file" id="bizLogoFile" accept="image/*" style="display:none" onchange="onLogoPick(event)">
        <button class="filebtn" onclick="document.getElementById('bizLogoFile').click()">画像を選ぶ</button>
        <button class="filebtn clear" id="bizLogoClear" onclick="clearLogo()" style="display:none">削除</button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="cancel" onclick="closeOverlay('bizOverlay')">キャンセル</button>
      <button class="save" onclick="saveBiz()">保存</button>
    </div>
  </div>
</div>

<!-- item modal -->
<div class="overlay" id="itemOverlay">
  <div class="sheet">
    <h2 id="itemModalTitle">提案を追加</h2>

      <label>画像 <span class="hint">（任意 / チラシ・見本など）</span></label>

        <div id="itemImgPrev" class="prev ph">画像</div>

        <button class="filebtn clear" id="itemImgClear" onclick="clearItemImg()" style="display:none">削除</button>

    </div>
    <div class="sheet-actions">

var DEFAULT_LOGOS = { "ワンバランスボクシングジム":LOGO_WB, "ONE-TRE":LOGO_OT };
var state = { businesses: [] };
var editingBizId = null;
var editingItem = { bizId:null, itemId:null };
var tmpLogo = null;      // base64 or null
var tmpItemImg = null;   // base64 or null
var currentTab = "biz";
var editingGoalId = null;
var editingPlan = { goalId:null, planId:null };

var DRAFT_KEY = "onebalance_proposal_app_v1_draft";

/* ---------- storage ---------- */
function load(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(raw){ state = JSON.parse(raw); }
    else { state = defaultState(); save(); }
  }catch(e){ state = defaultState(); }
  if(!state.businesses) state.businesses = [];
  if(!state.goals) state.goals = [];
  if(!state.seededLogos){
    state.businesses.forEach(function(b){
      if((!b.logo) && DEFAULT_LOGOS[b.name]) b.logo = DEFAULT_LOGOS[b.name];
    });
    state.seededLogos = true; save();
  }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ toast("保存容量がいっぱいです。画像を減らしてください"); }
}
function defaultState(){
  return { businesses:[
    { id:uid(), name:"ワンバランスボクシングジム", logo:LOGO_WB, items:[] },
    { id:uid(), name:"ONE-TRE", logo:LOGO_OT, items:[] }
  ], goals:[] };
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------- render ---------- */
function renderBiz(){
  var wrap = document.getElementById("view-biz");
  if(state.businesses.length===0){
    wrap.innerHTML = '<div class="empty" style="padding:50px 20px">右上の「＋ 事業を追加」から始めましょう</div>';
    return;
  }
  var html = "";
  state.businesses.forEach(function(b){
    var logo = b.logo
      ? '<img class="logo" src="'+b.logo+'" alt="">'
      : '<div class="logo"><div class="ph">'+initials(b.name)+'</div></div>';
    var items = "";
    if(b.items.length===0){
      items = '<div class="empty">提案がまだありません。下のボタンから追加</div>';
    } else {
      b.items.forEach(function(it){
        items += itemHtml(b.id, it);
      });
    }
    html +=
      '<div class="biz">'+
        '<div class="biz-head">'+
          logo+
          '<div class="biz-meta">'+
            '<div class="eyebrow">提案 '+b.items.length+'件</div>'+
            '<div class="biz-name">'+esc(b.name)+'</div>'+
          '</div>'+
          '<div class="head-actions">'+
            '<button class="icobtn" title="編集" onclick="openBizModal(\''+b.id+'\')">'+ICON.edit+'</button>'+
            '<button class="icobtn" title="削除" onclick="askDeleteBiz(\''+b.id+'\')">'+ICON.trash+'</button>'+
          '</div>'+

function itemHtml(bizId, it){
  var tags = "";
  if(it.url) tags += '<span class="tag url">URL</span>';
  if(it.img) tags += '<span class="tag img">画像</span>';
  var body = "";
  if(it.memo) body += '<div class="memo">'+esc(it.memo)+'</div>';
  if(it.url){
    body +=
      '<div class="attach-row">'+
        '<button class="btn copy" onclick="copyUrl(\''+jsq(it.url)+'\')">'+ICON.copy+'コピー</button>'+
        '<button class="btn qr" onclick="showQR(\''+jsq(it.url)+'\')">'+ICON.qr+'QRコード</button>'+
      '</div>'+
      '<div class="urltext">'+esc(it.url)+'</div>';
  }
  if(it.img){
    body += '<img class="item-img" src="'+it.img+'" alt="" onclick="viewImg(\''+jsq(it.img)+'\')">';
  }
  if(!it.memo && !it.url && !it.img){
    body += '<div class="memo" style="color:#8a94a0">（内容なし）</div>';
  }
  body +=
    '<div class="item-edit">'+
      '<button class="linkbtn" onclick="openItemModal(\''+bizId+'\',\''+it.id+'\')">編集</button>'+
      '<button class="linkbtn del" onclick="askDeleteItem(\''+bizId+'\',\''+it.id+'\')">削除</button>'+
    '</div>';
  return ''+
    '<div class="item" id="item-'+it.id+'">'+
      '<button class="item-head" onclick="toggleItem(\''+it.id+'\')">'+
        '<span class="dot"></span>'+
        '<span class="item-title">'+esc(it.title)+'</span>'+
        '<span class="item-tags">'+tags+'</span>'+
        ICON.chev+
      '</button>'+
      '<div class="item-body">'+body+'</div>'+
    '</div>';
}

function toggleItem(id){
  var el = document.getElementById("item-"+id);
  if(el) el.classList.toggle("open");
}

/* ---------- business modal ---------- */
function openBizModal(id){
  editingBizId = id;
  var nameI = document.getElementById("bizName");
  if(id){
    var b = findBiz(id);
    document.getElementById("bizModalTitle").textContent = "事業を編集";
    nameI.value = b.name;
    tmpLogo = b.logo || null;
  } else {
    document.getElementById("bizModalTitle").textContent = "事業を追加";
    nameI.value = "";
    tmpLogo = null;
  }
  refreshLogoPrev();
  openOverlay("bizOverlay");
  setTimeout(function(){ nameI.focus(); },250);
}
function refreshLogoPrev(){
  var prev = document.getElementById("bizLogoPrev");
  var clr = document.getElementById("bizLogoClear");
  if(tmpLogo){
    prev.outerHTML = '<img id="bizLogoPrev" class="prev" src="'+tmpLogo+'" alt="">';
    clr.style.display = "inline-block";
  } else {
    prev.outerHTML = '<div id="bizLogoPrev" class="prev ph"></div>';
    clr.style.display = "none";
  }
}
function onLogoPick(e){
  var f = e.target.files[0]; if(!f) return;
  resizeImage(f, 256, 0.85, function(data){ tmpLogo = data; refreshLogoPrev(); });
  e.target.value = "";
}
function clearLogo(){ tmpLogo = null; refreshLogoPrev(); }
function saveBiz(){
  var name = document.getElementById("bizName").value.trim();
  if(!name){ toast("事業名を入れてください"); return; }
  if(editingBizId){
    var b = findBiz(editingBizId);
    b.name = name; b.logo = tmpLogo;
  } else {
    state.businesses.push({ id:uid(), name:name, logo:tmpLogo, items:[] });
  }
  save(); render(); closeOverlay("bizOverlay");
}
function askDeleteBiz(id){
  var b = findBiz(id);
  showConfirm("この事業を削除しますか？", "「"+b.name+"」と中の提案"+b.items.length+"件がすべて消えます。\nこの操作は取り消せません。", function(){
    state.businesses = state.businesses.filter(function(x){ return x.id!==id; });
    save(); render(); closeOverlay("confirmOverlay");
    toast("削除しました");
  });
}

/* ---------- item modal ---------- */
function openItemModal(bizId, itemId){
  editingItem = { bizId:bizId, itemId:itemId };
  var t = document.getElementById("itemTitle");
  if(itemId){
    var it = findItem(bizId, itemId);
    document.getElementById("itemModalTitle").textContent = "提案を編集";
    t.value = it.title;
    document.getElementById("itemMemo").value = it.memo||"";
    document.getElementById("itemUrl").value = it.url||"";
    tmpItemImg = it.img||null;
  } else {
    document.getElementById("itemModalTitle").textContent = "提案を追加";
    t.value=""; document.getElementById("itemMemo").value="";
    document.getElementById("itemUrl").value=""; tmpItemImg=null;
  }
  refreshItemImgPrev();
  openOverlay("itemOverlay");
  setTimeout(function(){ t.focus(); },250);
}
function refreshItemImgPrev(){
  var prev = document.getElementById("itemImgPrev");
  var clr = document.getElementById("itemImgClear");
  if(tmpItemImg){
    prev.outerHTML = '<img id="itemImgPrev" class="prev" src="'+tmpItemImg+'" alt="">';
    clr.style.display="inline-block";
  } else {
    prev.outerHTML = '<div id="itemImgPrev" class="prev ph">画像</div>';
    clr.style.display="none";

function onItemImgPick(e){

  resizeImage(f, 1000, 0.82, function(data){ tmpItemImg = data; refreshItemImgPrev(); });

function clearItemImg(){ tmpItemImg=null; refreshItemImgPrev(); }
function saveItem(){
  var title = document.getElementById("itemTitle").value.trim();
  if(!title){ toast("タイトルを入れてください"); return; }
  var memo = document.getElementById("itemMemo").value.trim();
  var url = document.getElementById("itemUrl").value.trim();

function askDeleteItem(bizId, itemId){
  var it = findItem(bizId, itemId);
  showConfirm("この提案を削除しますか？", "「"+it.title+"」を削除します。\nこの操作は取り消せません。", function(){

  });

/* ---------- url / qr ---------- */
function copyUrl(url){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ toast("URLをコピーしました"); },
      function(){ legacyCopy(url); });
  } else { legacyCopy(url); }
}
function legacyCopy(url){
  var ta=document.createElement("textarea"); ta.value=url;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast("URLをコピーしました"); }
  catch(e){ toast("コピーできませんでした"); }
  document.body.removeChild(ta);
}
function showQR(url){
  var box = document.getElementById("qrCanvas");
  box.innerHTML="";
  try{
    var qr = qrcode(0,"M");
    qr.addData(url); qr.make();
    box.innerHTML = qr.createImgTag(6,8);
    var img = box.querySelector("img");
    if(img){ img.style.width="220px"; img.style.height="220px"; img.style.imageRendering="pixelated"; }
  }catch(e){ box.innerHTML='<div style="padding:30px;color:#8a94a0">QRを作れませんでした</div>'; }
  document.getElementById("qrUrl").textContent = url;
  openOverlay("qrOverlay");
}

/* ---------- confirm ---------- */
function showConfirm(title, msg, onYes){
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("confirmMsg").textContent = msg;
  var yes = document.getElementById("confirmYes");
  var clone = yes.cloneNode(true);
  yes.parentNode.replaceChild(clone, yes);
  clone.id="confirmYes";
  clone.addEventListener("click", onYes);
  openOverlay("confirmOverlay");
}

/* ---------- helpers ---------- */
function findBiz(id){ return state.businesses.find(function(b){ return b.id===id; }); }
function findItem(bizId,itemId){ var b=findBiz(bizId); return b?b.items.find(function(x){return x.id===itemId;}):null; }
function initials(name){
  if(!name) return "?";
  var n=name.replace(/\s/g,"");
  return n.slice(0,2);
}
function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function jsq(s){ return (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n").replace(/\r/g,""); }

function resizeImage(file, maxSide, quality, cb){
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>h && w>maxSide){ h=Math.round(h*maxSide/w); w=maxSide; }
      else if(h>=w && h>maxSide){ w=Math.round(w*maxSide/h); h=maxSide; }
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      try{ cb(c.toDataURL("image/jpeg",quality)); }
      catch(e){ cb(ev.target.result); }
    };
    img.onerror=function(){ cb(ev.target.result); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- overlay / toast ---------- */
function openOverlay(id){ document.getElementById(id).classList.add("show"); }
function closeOverlay(id){ document.getElementById(id).classList.remove("show"); }
var toastTimer=null;
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove("show"); },1900);
}
[].forEach.call(document.querySelectorAll(".overlay"),function(ov){
  ov.addEventListener("click",function(e){ if(e.target===ov) ov.classList.remove("show"); });
});

/* ---------- cache update ---------- */
function forceUpdate(){
  if("serviceWorker" in navigator){
    navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); });
  }
  if(window.caches && caches.keys){
    caches.keys().then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); }).finally(function(){ location.reload(true); });
  } else { location.reload(true); }
}

/* ---------- tabs ---------- */
function render(){ renderBiz(); renderGoal(); }
function switchTab(t){
  currentTab = t;
  document.getElementById("view-biz").style.display  = (t==="biz") ? "" : "none";
  document.getElementById("view-goal").style.display = (t==="goal")? "" : "none";
  document.getElementById("tab-biz").classList.toggle("active", t==="biz");
  document.getElementById("tab-goal").classList.toggle("active", t==="goal");
  document.getElementById("addBtn").textContent = (t==="biz") ? "＋ 事業を追加" : "＋ 目標を追加";
}
function onAdd(){ if(currentTab==="biz") openBizModal(null); else openGoalModal(null); }

/* ---------- goal render ---------- */
function goalProgress(g){
  var total=0, done=0;
  g.plans.forEach(function(p){ p.steps.forEach(function(s){ total++; if(s.done) done++; }); });
  var pct = total ? Math.round(done/total*100) : 0;
  return { total:total, done:done, pct:pct };
}
function renderGoal(){
  var wrap = document.getElementById("view-goal");
  if(state.goals.length===0){
    wrap.innerHTML = '<div class="empty" style="padding:50px 20px">右上の「＋ 目標を追加」から始めましょう</div>';
    return;
  }
  var html = "";
  state.goals.forEach(function(g){
    var pr = goalProgress(g);
    var plans = "";
    if(g.plans.length===0){
      plans = '<div class="empty">プランがまだありません。下のボタンから追加</div>';
    } else {
      g.plans.forEach(function(p){ plans += planHtml(g.id, p); });
    }
    html +=
      '<div class="goal">'+
        '<div class="goal-head">'+
          '<div class="goal-meta">'+
            '<div class="eyebrow">目標 / ビジョン</div>'+
            '<div class="goal-name">'+esc(g.name)+'</div>'+
          '</div>'+
          '<div class="head-actions">'+
            '<button class="icobtn" title="編集" onclick="openGoalModal(\''+g.id+'\')">'+ICON.edit+'</button>'+
            '<button class="icobtn" title="削除" onclick="askDeleteGoal(\''+g.id+'\')">'+ICON.trash+'</button>'+
          '</div>'+
        '</div>'+
        '<div class="bar"><div class="fill" style="width:'+pr.pct+'%"></div></div>'+
        '<div class="prog-text">'+pr.done+'/'+pr.total+' 完了 ・ '+pr.pct+'%</div>'+
        '<div class="plans">'+plans+
          '<button class="add-item" onclick="openPlanModal(\''+g.id+'\',null)">＋ プランを追加</button>'+
        '</div>'+
      '</div>';
  });
  wrap.innerHTML = html;
}
function planHtml(goalId, p){
  var steps = "";
  steps += insBtn(goalId, p.id, 0);
  p.steps.forEach(function(s, i){
    steps +=
      '<div class="step'+(s.done?' done':'')+'">'+
        '<span class="ck" onclick="toggleStep(\''+goalId+'\',\''+p.id+'\',\''+s.id+'\')">'+ICON.check+'</span>'+
        '<span class="stext" onclick="openStepModal(\''+goalId+'\',\''+p.id+'\',null,\''+s.id+'\')">'+esc(s.text)+'</span>'+
        '<button class="step-del" onclick="askDeleteStep(\''+goalId+'\',\''+p.id+'\',\''+s.id+'\')">'+ICON.trash+'</button>'+
      '</div>';
    steps += insBtn(goalId, p.id, i+1);
  });
  return ''+
    '<div class="plan">'+
      '<div class="plan-head">'+
        '<span class="pdot"></span>'+
        '<span class="plan-name">'+esc(p.name)+'</span>'+
        '<button class="linkbtn" onclick="openPlanModal(\''+goalId+'\',\''+p.id+'\')">編集</button>'+
        '<button class="linkbtn del" onclick="askDeletePlan(\''+goalId+'\',\''+p.id+'\')">削除</button>'+
      '</div>'+
      '<div class="steps">'+steps+'</div>'+
    '</div>';
}
function insBtn(goalId, planId, idx){
  return '<button class="ins" onclick="openStepModal(\''+goalId+'\',\''+planId+'\','+idx+',null)">＋ ここに差し込む</button>';
}

/* ---------- goal CRUD ---------- */
function findGoal(id){ return state.goals.find(function(g){ return g.id===id; }); }
function findPlan(goalId, planId){ var g=findGoal(goalId); return g?g.plans.find(function(p){return p.id===planId;}):null; }
function findStep(goalId, planId, stepId){ var p=findPlan(goalId,planId); return p?p.steps.find(function(s){return s.id===stepId;}):null; }

function openGoalModal(id){
  editingGoalId = id;
  var i = document.getElementById("goalName");
  if(id){ document.getElementById("goalModalTitle").textContent="目標を編集"; i.value=findGoal(id).name; }
  else  { document.getElementById("goalModalTitle").textContent="目標を追加"; i.value=""; }
  openOverlay("goalOverlay"); setTimeout(function(){ i.focus(); },250);
}
function saveGoal(){
  var name=document.getElementById("goalName").value.trim();
  if(!name){ toast("目標を入れてください"); return; }
  if(editingGoalId){ findGoal(editingGoalId).name=name; }
  else { state.goals.push({ id:uid(), name:name, plans:[] }); }
  save(); render(); closeOverlay("goalOverlay");
}
function askDeleteGoal(id){
  var g=findGoal(id);
  showConfirm("この目標を削除しますか？", "「"+g.name+"」とプラン・ステップがすべて消えます。\nこの操作は取り消せません。", function(){
    state.goals=state.goals.filter(function(x){return x.id!==id;});
    save(); render(); closeOverlay("confirmOverlay"); toast("削除しました");
  });
}

function openPlanModal(goalId, planId){
  editingPlan={ goalId:goalId, planId:planId };
  var i=document.getElementById("planName");
  if(planId){ document.getElementById("planModalTitle").textContent="プランを編集"; i.value=findPlan(goalId,planId).name; }
  else { document.getElementById("planModalTitle").textContent="プランを追加"; i.value=""; }
  openOverlay("planOverlay"); setTimeout(function(){ i.focus(); },250);
}
function savePlan(){
  var name=document.getElementById("planName").value.trim();
  if(!name){ toast("プラン名を入れてください"); return; }
  var g=findGoal(editingPlan.goalId);
  if(editingPlan.planId){ findPlan(editingPlan.goalId,editingPlan.planId).name=name; }
  else { g.plans.push({ id:uid(), name:name, steps:[] }); }
  save(); render(); closeOverlay("planOverlay");
}
function askDeletePlan(goalId, planId){
  var p=findPlan(goalId,planId);
  showConfirm("このプランを削除しますか？", "「"+p.name+"」とステップがすべて消えます。\nこの操作は取り消せません。", function(){
    var g=findGoal(goalId);
    g.plans=g.plans.filter(function(x){return x.id!==planId;});
    save(); render(); closeOverlay("confirmOverlay"); toast("削除しました");
  });
}

function openStepModal(goalId, planId, atIndex, stepId){
  editingStep={ goalId:goalId, planId:planId, atIndex:atIndex, stepId:stepId };
  var i=document.getElementById("stepText");
  if(stepId){ document.getElementById("stepModalTitle").textContent="ステップを編集"; i.value=findStep(goalId,planId,stepId).text; }
  else { document.getElementById("stepModalTitle").textContent="ステップを追加"; i.value=""; }
  openOverlay("stepOverlay"); setTimeout(function(){ i.focus(); },250);
}
function saveStep(){
  var text=document.getElementById("stepText").value.trim();
  if(!text){ toast("内容を入れてください"); return; }
  var p=findPlan(editingStep.goalId, editingStep.planId);
  if(editingStep.stepId){ findStep(editingStep.goalId,editingStep.planId,editingStep.stepId).text=text; }
  else {
    var s={ id:uid(), text:text, done:false };
    var at=editingStep.atIndex;
    if(at===null || at===undefined || at>p.steps.length) p.steps.push(s);
    else p.steps.splice(at,0,s);
  }
  save(); render(); closeOverlay("stepOverlay");
}
function askDeleteStep(goalId, planId, stepId){
  var s=findStep(goalId,planId,stepId);
  showConfirm("このステップを削除しますか？", "「"+s.text+"」を削除します。\nこの操作は取り消せません。", function(){
    var p=findPlan(goalId,planId);
    p.steps=p.steps.filter(function(x){return x.id!==stepId;});
    save(); render(); closeOverlay("confirmOverlay"); toast("削除しました");
  });
}
function toggleStep(goalId, planId, stepId){
  var s=findStep(goalId,planId,stepId);
  if(s){ s.done=!s.done; save(); render(); }
}

/* ---------- init ---------- */
load();
render();
</script>
